<ion-content class="splash-content">
  <div class="splash-container" [class.animado]="animando">

    <div class="splash-logo">
      <div class="logo-ring ring3"></div>
      <div class="logo-ring ring2"></div>
      <div class="logo-ring ring1"></div>
      <div class="logo-circle">
        <ion-icon name="heart-outline"></ion-icon>
      </div>
    </div>

    <div class="splash-text">
      <h1>MedicAlert <span>RD</span></h1>
      <p>Tu seguridad médica</p>
    </div>

    <div class="splash-loader">
      <div class="loader-bar"></div>
    </div>

    <div class="splash-footer">
      <p>Cargando tu información médica...</p>
    </div>

  </div>
</ion-content>
